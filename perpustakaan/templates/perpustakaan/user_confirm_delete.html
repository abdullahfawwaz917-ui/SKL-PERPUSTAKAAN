{% extends "perpustakaan/base.html" %}

{% block title %}Hapus User{% endblock %}

{% block header %}
<div class="topbar">
  <div>
    <a href="{% url 'user_list' %}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Kelola User
    </a>
    <h1 class="page-title">Hapus User</h1>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="card">
  <p class="delete-intro">Anda akan menghapus:</p>
  <p class="delete-target">{{ siswa.nama }}</p>
  <p class="delete-note">Data peminjaman milik user ini tidak akan otomatis dihapus.</p>

  <form method="post" class="form-actions">
    {% csrf_token %}
    <a href="{% url 'user_list' %}" class="btn btn-outline">Batal</a>
    <button type="submit" class="btn btn-danger">Hapus</button>
  </form>
</div>
{% endblock %}
